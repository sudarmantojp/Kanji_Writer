<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Auto Load</title>
</head>
<body>

  <div id="app"></div>

  <script>
    window.onload = function() {
      fetch('/public/kanji-writer.html')
        .then(res => res.text())
        .then(data => {
          document.getElementById('app').innerHTML = data;
        });
    }
  </script>

</body>
</html>
